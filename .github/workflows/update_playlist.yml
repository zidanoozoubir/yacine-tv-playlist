name: Update IPTV Playlist

on:
  schedule:
    # تشغيل تلقائي كل 30 دقيقة
    - cron: '*/30 * * * *'
  workflow_dispatch: # يتيح لك التشغيل يدوياً بضغطة زر عند الحاجة

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Run Scraper
      run: python yacine_scraper.py

    - name: Commit and Push changes
      run: |
        git config --global user.name "GitHub Action"
        git config --global user.email "action@github.com"
        git add playlist.m3u
        git commit -m "Update playlist.m3u [skip ci]" || echo "No changes to commit"
        git push
